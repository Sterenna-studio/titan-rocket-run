name: Sync to gwen-ha-star-static

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in gwen-ha-star-static
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          repository: sterenna-studio/gwen-ha-star-static
          event-type: titan-rocket-run-updated
